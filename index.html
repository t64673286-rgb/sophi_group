<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTISAN - 해외선물 무료 종목 추천</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background-color: #050505; color: #fff; font-family: 'Noto Sans KR', sans-serif; }
        .container { max-width: 500px; margin: 0 auto; background: #000; min-height: 100vh; position: relative; border: 1px solid #222; }
        
        /* 헤더: 긴급함 강조 */
        .header { background: #D4AF37; color: #000; text-align: center; padding: 10px; font-weight: bold; font-size: 0.9rem; }
        
        /* 히어로: 혜택 강조 */
        .hero { padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, #111, #000); }
        h1 { font-size: 1.8rem; line-height: 1.4; margin-bottom: 20px; }
        h1 span { color: #D4AF37; }
        .gift-box { border: 1px dashed #D4AF37; padding: 15px; margin: 20px 0; border-radius: 10px; background: rgba(212, 175, 55, 0.05); }

        /* 수익 인증 (실체 보여주기) */
        .proof { padding: 40px 20px; border-top: 1px solid #111; text-align: center; }
        .proof img { width: 100%; border-radius: 5px; border: 1px solid #333; margin: 20px 0; }

        /* 버튼: 강력한 유입 */
        .cta-area { position: sticky; bottom: 0; padding: 20px; background: linear-gradient(to top, #000 80%, transparent); }
        .btn-free { display: block; background: #D4AF37; color: #000; text-align: center; padding: 20px; border-radius: 50px; text-decoration: none; font-size: 1.3rem; font-weight: bold; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🚨 선착순 100명 한정 무료 정보 개방</div>
        
        <div class="hero">
            <h1>"아직도 <span>손실</span>만 보고 계십니까?"</h1>
            <p style="color:#aaa;">인공지능(AI)과 심법(心法)이 결합된<br>해외선물 실시간 종목 추천</p>
            
            <div class="gift-box">
                <p style="margin:0; color:#D4AF37;">🎁 오늘 가입 시 즉시 혜택</p>
                <ul style="text-align:left; font-size:0.9rem; color:#ccc; line-height:1.8;">
                    <li>매일 아침 나스닥/크루드오일 주요 타점 공유</li>
                    <li>승률 80% 이상 '아티산' 실전 매매기법 자료</li>
                    <li>무료 리딩 커뮤니티 정회원 등업</li>
                </ul>
            </div>
        </div>

        <div class="proof">
            <h3 style="color:#D4AF37;">최근 4일간 순수익 $8,554.50</h3>
            <p style="font-size:0.8rem; color:#888;">(실제 아티산 시스템 매매 결과)</p>
            <img src="매매0406.png" alt="수익인증">
            <p style="font-size:0.9rem; color:#ccc;">"우리는 숫자로만 말합니다. 결과가 증명합니다."</p>
        </div>

        <div class="cta-area">
            <a href="https://cafe.naver.com/tradingpic" target="_blank" class="btn-free">
                🚢 무료 종목 추천받기 (클릭)
            </a>
            <p style="text-align:center; font-size:0.7rem; color:#666; margin-top:10px;">* 버튼 클릭 시 네이버 카페로 이동합니다.</p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Noto Sans KR', sans-serif; }
        .v-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #fff; padding: 0 20px; }
        .gold-text { color: #D4AF37; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        h1 { font-size: 2.1rem; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .quote-box { background: rgba(255, 255, 255, 0.07); border-left: 4px solid #D4AF37; padding: 25px; margin: 30px 0; max-width: 500px; }
        .btn-join { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: #fff; padding: 18px 35px; border-radius: 8px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>
    <div class="v-bg">
        <video autoplay muted loop playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">

            <p style="font-size: 0.9rem; color: #ccc;">수익은 <b>심법(心法)</b>이 만듭니다.</p>
        </div>
        <a href="https://cafe.naver.com/tradingpic" target="_blank" class="btn-join">매매신호레시피 합류하기</a>
    </div>
</body>
</html>

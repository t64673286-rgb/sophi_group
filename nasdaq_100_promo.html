<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTISAN - 나스닥 100 일당 $1,000의 법칙</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background-color: #00050a; color: #fff; font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; background: #000; min-height: 100vh; position: relative; border: 1px solid #002a4d; }
        .header { background: #0066ff; color: #fff; text-align: center; padding: 10px; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; }
        .hero { padding: 40px 20px; text-align: center; background: radial-gradient(circle at top, #001a33 0%, #000 70%); }
        h1 { font-size: 1.7rem; margin-bottom: 10px; line-height: 1.3; }
        h1 span { color: #0066ff; text-shadow: 0 0 15px rgba(0,102,255,0.6); }
        .profit-badge { display: inline-block; background: rgba(0,102,255,0.1); border: 1px solid #0066ff; color: #0066ff; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; }

        /* 메인 비주얼: 나스닥 수익 영상(GIF) 공간 */
        .visual-area { padding: 0 20px; }
        .visual-frame { width: 100%; border-radius: 15px; border: 2px solid #0066ff; box-shadow: 0 0 30px rgba(0,102,255,0.4); overflow: hidden; background: #111; }
        .visual-frame img { width: 100%; display: block; object-fit: cover; }
        
        .info-section { padding: 30px 20px; text-align: center; }
        .info-section h2 { font-size: 1.2rem; margin-bottom: 10px; color: #fff; }
        .info-section p { font-size: 0.9rem; color: #88aacc; margin-bottom: 20px; }
        .disclaimer { padding: 20px; font-size: 0.7rem; color: #445566; text-align: center; border-top: 1px solid #112233; margin-bottom: 100px; }
        
        /* 하단 고정 버튼 */
        .cta-area { position: sticky; bottom: 0; padding: 20px; background: linear-gradient(to top, #000 80%, transparent); z-index: 100; }
        .btn-nasdaq { display: block; background: #0066ff; color: #fff; text-align: center; padding: 18px; border-radius: 50px; text-decoration: none; font-size: 1.1rem; font-weight: bold; box-shadow: 0 10px 25px rgba(0,102,255,0.5); animation: pulseBlue 2s infinite; }
        @keyframes pulseBlue { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">⚡ NASDAQ 100 STRATEGY BY ARTISAN UNIVERSE</div>
        
        <div class="hero">
            <div class="profit-badge">DAILY TARGET: $1,000+</div>
            <h1>나스닥 <span>100</span><br>일당 100만 원의 법칙</h1>
            <p style="color:#6688aa;">데이터가 증명하는 압도적 수익 시그널</p>
        </div>

        <div class="visual-area">
            <div class="visual-frame">
                <img src="nasdaq_visual.gif" alt="나스닥 수익 폭포">
            </div>
        </div>

        <div class="info-section">
            <h2>"변동성은 위기가 아닌 기회입니다"</h2>
            <p>리딩비 없는 투명한 무료 타점.<br>아티산 함대에서 실시간으로 공유합니다.</p>
        </div>

        <div class="disclaimer">
            모든 투자는 본인의 판단과 책임하에 이루어집니다.<br>투자 결과를 보장하지 않으며 원금 손실의 위험이 있습니다.
        </div>

        <div class="cta-area">
            <a href="https://cafe.naver.com/myartisan" target="_blank" class="btn-nasdaq">
                🚢 나스닥 수익 함대 승선하기
            </a>
        </div>
    </div>
</body>
</html>
